  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
    }

    .wrapper {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 48px;
      width: 100%;
      max-width: 1100px;
    }

    .sidebar {
      flex: 0 0 180px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-top: 4px;
    }

    .site-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.45rem;
      letter-spacing: 0.04em;
      line-height: 1.15;
      text-transform: uppercase;
      color: #111;
    }

    .sidebar-links {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sidebar-links a {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #888;
      text-decoration: none;
      transition: color 0.2s;
      width: fit-content;
    }

    .sidebar-links a:hover { color: #111; }

    .grid {
      flex: 1;
      columns: 3 160px;
      column-gap: 12px;
    }

    .photo-item {
      break-inside: avoid;
      margin-bottom: 12px;
      cursor: pointer;
    }

    .photo-item img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 6px;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .photo-item:hover img { transform: scale(1.02); }

    .photo-number {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.68rem;
      font-weight: 300;
      color: #aaa;
      margin-top: 5px;
      padding-left: 2px;
    }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.97);
      z-index: 100;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 85vw;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 6px;
    }

    .lightbox-close {
      position: fixed;
      top: 24px;
      right: 32px;
      color: #bbb;
      font-size: 1.6rem;
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1;
      transition: color 0.2s;
    }

    .lightbox-close:hover { color: #111; }

    @media (max-width: 640px) {
      body { padding: 28px 20px 48px; align-items: flex-start; }

      .wrapper { flex-direction: column; gap: 24px; }

      .sidebar {
        flex: none;
        width: 100%;
        flex-direction: row;
        align-items: baseline;
        justify-content: space-between;
        gap: 0;
      }

      .site-name { font-size: 1.2rem; }

      .sidebar-links { flex-direction: row; gap: 20px; }

      .grid { columns: 1; width: 100%; }
    }
  </style>

</head>
<body>

  </div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">×</button>
    <img src="" alt="" id="lightbox-img">
  </div>

  <script>
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lightbox-img');
    const lbClose  = document.getElementById('lightbox-close');

    document.querySelectorAll('.photo-item img').forEach(img => {
      img.addEventListener('click', () => {
        lbImg.src = img.src;
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
      });
    });

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      lbImg.src = '';
    }

    lbClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
  </script>
